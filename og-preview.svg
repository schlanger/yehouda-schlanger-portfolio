      <stop offset="0%" stop-color="#07111f" />
      <stop offset="100%" stop-color="#0d1d34" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(220 120) rotate(55) scale(420 360)">
      <stop offset="0%" stop-color="#33d1c6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#33d1c6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(1020 140) rotate(120) scale(340 280)">
      <stop offset="0%" stop-color="#ff8b5e" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#ff8b5e" stop-opacity="0" />
    </radialGradient>
