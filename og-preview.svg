<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Yehouda Schlanger</title>
  <desc id="desc">Prévisualisation du portfolio Ingénieur DevOps et Cloud de Yehouda Schlanger.</desc>
  <defs>
